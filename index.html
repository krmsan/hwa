<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HWA Event Calculator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    min-height:100vh;
    color:#e0dcd4;
    overflow-x:hidden;
    background:#060a14;
}
/* Space nebula background */
.bg{
    position:fixed;top:0;left:0;right:0;bottom:0;z-index:0;
    background:
        radial-gradient(ellipse at 25% 15%, rgba(25,70,110,0.45) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 25%, rgba(90,35,70,0.35) 0%, transparent 45%),
        radial-gradient(ellipse at 50% 85%, rgba(15,50,90,0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 75%, rgba(60,30,20,0.25) 0%, transparent 40%),
        #060a14;
}
.app{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:0 6px 120px}

/* Header */
.header{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px 8px;
}
.header h1{
    font-size:22px;font-weight:700;color:#fff;
    text-shadow:0 0 20px rgba(100,160,255,0.3);
}
.event-meta{
    display:flex;flex-direction:column;align-items:flex-end;gap:2px;
}
.event-meta .event-title{
    font-size:11px;font-weight:600;color:#c8a84e;
    letter-spacing:0.5px;
}
.event-meta .event-date{
    font-size:10px;color:#6a7a8e;
}

/* Tabs */
.tabs{
    display:flex;flex-wrap:wrap;gap:6px;
    padding:6px 12px 10px;justify-content:center;
}
.tab{
    padding:6px 12px;
    font-size:11.5px;font-weight:600;
    color:#8ea4be;
    background:rgba(15,25,50,0.7);
    border:1.5px solid rgba(60,90,130,0.35);
    border-radius:5px;
    cursor:pointer;
    transition:all 0.2s;
    white-space:nowrap;
    user-select:none;
}
.tab:hover{border-color:rgba(80,140,220,0.5);color:#b0c8e8}
.tab.active{
    color:#fff;
    background:rgba(25,50,90,0.8);
    border-color:rgba(90,160,255,0.6);
    box-shadow:0 0 12px rgba(60,130,255,0.2), inset 0 0 10px rgba(60,130,255,0.1);
}

/* Sub-tabs (day selector) */
.sub-tabs{
    display:none;flex-wrap:wrap;gap:6px;
    padding:2px 12px 8px;justify-content:center;
}
.sub-tabs.visible{display:flex}
.sub-tab{
    padding:5px 14px;
    font-size:11px;font-weight:600;
    color:#7a9ab8;
    background:rgba(10,18,38,0.6);
    border:1.5px solid rgba(50,75,110,0.3);
    border-radius:4px;
    cursor:pointer;
    transition:all 0.2s;
    user-select:none;
}
.sub-tab:hover{border-color:rgba(70,130,200,0.45);color:#a0c0e0}
.sub-tab.active{
    color:#ffd780;
    background:rgba(60,45,15,0.5);
    border-color:rgba(200,160,60,0.5);
    box-shadow:0 0 8px rgba(200,160,60,0.15);
}

/* Subtitle */
.subtitle{
    text-align:center;
    font-size:12.5px;
    color:#8a9bb0;
    padding:8px 16px 14px;
    font-style:italic;
}

/* Quest rows */
.quest-list{padding:0 10px}
.quest-row{
    display:flex;align-items:center;
    padding:12px 14px;
    margin-bottom:8px;
    background:rgba(12,20,38,0.65);
    border-radius:8px;
    cursor:pointer;
    transition:all 0.2s;
    border:1.5px solid transparent;
    user-select:none;
    gap:10px;
}
.quest-row:hover{background:rgba(18,30,55,0.75)}
.quest-row.checked{
    background:rgba(20,55,35,0.5);
    border-color:rgba(60,180,80,0.35);
}

/* Quest bullet */
.quest-bullet{
    width:8px;height:8px;
    border-radius:50%;
    background:radial-gradient(circle,#5a8ec0,#2a5080);
    flex-shrink:0;
    box-shadow:0 0 6px rgba(80,140,220,0.4);
}
.quest-row.checked .quest-bullet{
    background:radial-gradient(circle,#5adf6a,#2a9040);
    box-shadow:0 0 6px rgba(60,200,80,0.5);
}

/* Quest info */
.quest-info{flex:1;min-width:0}
.quest-text{
    font-size:13.5px;font-weight:500;color:#ddd8d0;
    line-height:1.3;
}

/* Reward icons */
.quest-rewards{
    display:flex;gap:6px;align-items:center;flex-shrink:0;
}
.reward-icon{
    min-width:52px;height:46px;
    border-radius:7px;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:1px;
    position:relative;
    border:1.5px solid rgba(255,255,255,0.15);
    padding:3px 6px;
}
.reward-icon.type-coin{
    background:linear-gradient(145deg,#2a5590,#1a3560);
    box-shadow:0 2px 8px rgba(20,50,100,0.5);
}
.reward-icon.type-crown{
    background:linear-gradient(145deg,#8a3530,#5a2025);
    box-shadow:0 2px 8px rgba(100,30,30,0.5);
}
.reward-icon.type-weapon{
    background:linear-gradient(145deg,#7a4a20,#4a2a10);
    box-shadow:0 2px 8px rgba(80,30,10,0.5);
}
.reward-name{
    font-size:8px;font-weight:600;
    color:#c0d8f0;
    white-space:nowrap;
    letter-spacing:0.3px;
    text-transform:uppercase;
    line-height:1;
}
.reward-amt{
    font-size:13px;font-weight:800;
    color:#ffd780;
    white-space:nowrap;
    line-height:1;
    text-shadow:0 1px 2px rgba(0,0,0,0.5);
}

/* Go for it / Complete button */
.quest-btn{
    padding:8px 14px;
    border-radius:6px;
    font-size:12px;font-weight:700;
    border:none;
    cursor:pointer;
    transition:all 0.2s;
    white-space:nowrap;
    flex-shrink:0;
    text-transform:none;
    letter-spacing:0.3px;
}
.quest-btn.go{
    background:linear-gradient(180deg,#2478d0,#1858a0);
    color:#fff;
    box-shadow:0 2px 8px rgba(20,80,180,0.4);
    border:1px solid rgba(50,120,220,0.4);
}
.quest-btn.go:hover{
    background:linear-gradient(180deg,#2888e0,#1868b0);
}
.quest-btn.done{
    background:linear-gradient(180deg,#38a848,#288838);
    color:#fff;
    box-shadow:0 2px 8px rgba(40,140,60,0.4);
    border:1px solid rgba(60,180,80,0.4);
}

/* Tab subtotal */
.tab-total{
    display:flex;align-items:center;justify-content:center;
    gap:16px;
    padding:12px 16px;margin:4px 10px 0;
    background:rgba(12,20,38,0.5);
    border-radius:8px;
    border:1px solid rgba(60,90,130,0.2);
}
.tab-total-label{font-size:12px;color:#8a9bb0;font-weight:500}
.tab-total-val{font-size:16px;font-weight:700;color:#ffd780}
.tab-total-val.secondary{color:#c898ff}

/* Fixed bottom totals bar */
.totals-bar{
    position:fixed;bottom:0;left:0;right:0;z-index:50;
    background:rgba(8,14,28,0.95);
    backdrop-filter:blur(12px);
    border-top:1px solid rgba(60,100,160,0.3);
    padding:12px 16px;
}
.totals-inner{
    max-width:700px;margin:0 auto;
    display:flex;align-items:center;justify-content:space-between;
    gap:12px;
}
.totals-section{text-align:center;flex:1}
.totals-label{
    font-size:10px;color:#6a7a8e;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;
    display:flex;align-items:center;justify-content:center;gap:4px;
}
.totals-label img{width:22px;height:22px;border-radius:4px}
.totals-val{font-size:20px;font-weight:800}
.totals-val.gold{color:#ffd780}
.totals-val.purp{color:#c898ff}
.totals-val.grn{color:#5adf6a}
.totals-divider{width:1px;height:36px;background:rgba(60,100,160,0.3)}

/* Checked count badge on tabs */
.tab-badge{
    display:inline-block;
    min-width:16px;height:16px;
    line-height:16px;
    text-align:center;
    font-size:10px;font-weight:700;
    background:#c8a84e;
    color:#1a1000;
    border-radius:8px;
    margin-left:5px;
    padding:0 4px;
}
.tab-badge:empty{display:none}

/* hide inactive panels */
.panel{display:none}
.panel.active{display:block}

@media(max-width:420px){
    .tab{padding:5px 8px;font-size:10.5px}
    .quest-row{padding:10px;gap:8px}
    .quest-text{font-size:12.5px}
    .reward-icon{min-width:44px;height:40px;padding:2px 4px}
    .reward-amt{font-size:11px}
    .quest-btn{padding:6px 10px;font-size:11px}
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="app">
    <div class="header">
        <h1>Events</h1>
        <div class="event-meta" id="eventMeta"></div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="sub-tabs" id="subtabs"></div>
    <div class="subtitle" id="subtitle"></div>
    <div id="panels"></div>
</div>
<div class="totals-bar">
    <div class="totals-inner">
        <div class="totals-section">
            <div class="totals-label">Selected</div>
            <div class="totals-val grn" id="totalChecked">0 / 29</div>
        </div>
        <div class="totals-divider"></div>
        <div class="totals-section">
            <div class="totals-label"><img src="coin_img.png" alt="">Coin</div>
            <div class="totals-val gold" id="totalCoin">0</div>
        </div>
        <div class="totals-divider"></div>
        <div class="totals-section">
            <div class="totals-label"><img src="crown_img.png" alt="">Crown</div>
            <div class="totals-val purp" id="totalCrown">0</div>
        </div>
        <div class="totals-divider"></div>
        <div class="totals-section">
            <div class="totals-label"><img src="weapon_img.png" alt="">Weapon</div>
            <div class="totals-val" style="color:#e8734a" id="totalWeapon">0</div>
        </div>
    </div>
</div>

<script>
let events = [];
let groups = [];      // unique event names for main tabs
let activeGroup = 0;  // which main tab
let activeDay = 0;    // which day sub-tab (index within group)

fetch('db.json')
    .then(r => r.json())
    .then(data => {
        events = data.events.map(ev => ({
            ...ev,
            tiers: ev.tiers.map(t => ({ ...t, prog: t.progress, checked: false }))
        }));
        // Build unique groups preserving order
        const seen = new Set();
        events.forEach(ev => {
            if (!seen.has(ev.name)) { seen.add(ev.name); groups.push(ev.name); }
        });
        // Show event name & date
        const meta = document.getElementById('eventMeta');
        if (data.eventName) {
            meta.innerHTML = `<span class="event-title">${data.eventName}</span><span class="event-date">${data.eventDate || ''}</span>`;
        }
        render();
    });

function getGroupEvents(groupName) {
    return events.filter(ev => ev.name === groupName);
}

function getActiveEvent() {
    const groupEvs = getGroupEvents(groups[activeGroup]);
    return groupEvs[activeDay] || groupEvs[0];
}

function render() {
    if (!events.length) return;

    // Main tabs
    const tabsEl = document.getElementById('tabs');
    tabsEl.innerHTML = '';
    groups.forEach((name, i) => {
        const t = document.createElement('div');
        t.className = 'tab' + (i === activeGroup ? ' active' : '');
        const groupEvs = getGroupEvents(name);
        const checkedCount = groupEvs.reduce((s, ev) => s + ev.tiers.filter(t => t.checked).length, 0);
        t.innerHTML = name + (checkedCount > 0 ? `<span class="tab-badge">${checkedCount}</span>` : '');
        t.addEventListener('click', () => { activeGroup = i; activeDay = 0; render(); });
        tabsEl.appendChild(t);
    });

    // Sub-tabs (days)
    const subtabsEl = document.getElementById('subtabs');
    subtabsEl.innerHTML = '';
    const groupEvs = getGroupEvents(groups[activeGroup]);
    if (groupEvs.length > 1) {
        subtabsEl.className = 'sub-tabs visible';
        groupEvs.forEach((ev, di) => {
            const st = document.createElement('div');
            st.className = 'sub-tab' + (di === activeDay ? ' active' : '');
            const dc = ev.tiers.filter(t => t.checked).length;
            st.innerHTML = `Day ${ev.day}` + (dc > 0 ? `<span class="tab-badge">${dc}</span>` : '');
            st.addEventListener('click', () => { activeDay = di; render(); });
            subtabsEl.appendChild(st);
        });
    } else {
        subtabsEl.className = 'sub-tabs';
    }

    // Subtitle
    const ev = getActiveEvent();
    document.getElementById('subtitle').textContent = ev.subtitle;

    // Panels
    const panelsEl = document.getElementById('panels');
    panelsEl.innerHTML = '';

    const list = document.createElement('div');
    list.className = 'quest-list';

    ev.tiers.forEach((tier, ti) => {
        const row = document.createElement('div');
        row.className = 'quest-row' + (tier.checked ? ' checked' : '');

        const bullet = document.createElement('div');
        bullet.className = 'quest-bullet';

        const info = document.createElement('div');
        info.className = 'quest-info';
        info.innerHTML = `<div class="quest-text">${tier.text}</div>`;

        const rewards = document.createElement('div');
        rewards.className = 'quest-rewards';

        const typeClass = { 'Coin': 'type-coin', 'Crown Fragment': 'type-crown', 'Weapon Fragment': 'type-weapon' };

        const r1Icon = document.createElement('div');
        r1Icon.className = 'reward-icon ' + (typeClass[ev.r1_name] || 'type-coin');
        r1Icon.innerHTML = `<span class="reward-name">${ev.r1_name || 'Coin'}</span><span class="reward-amt">${tier.r1.toLocaleString('en-US')}</span>`;
        rewards.appendChild(r1Icon);

        if (tier.r2 > 0 && ev.r2_name) {
            const r2Icon = document.createElement('div');
            r2Icon.className = 'reward-icon ' + (typeClass[ev.r2_name] || 'type-coin');
            r2Icon.innerHTML = `<span class="reward-name">${ev.r2_name}</span><span class="reward-amt">${tier.r2}</span>`;
            rewards.appendChild(r2Icon);
        }

        const btn = document.createElement('button');
        btn.className = 'quest-btn ' + (tier.checked ? 'done' : 'go');
        btn.textContent = tier.checked ? 'Complete' : 'Go for it!';

        row.addEventListener('click', () => { tier.checked = !tier.checked; render(); });

        row.appendChild(bullet);
        row.appendChild(info);
        row.appendChild(rewards);
        row.appendChild(btn);
        list.appendChild(row);
    });

    panelsEl.appendChild(list);

    // Tab subtotal (all days combined for daily events)
    const allGroupCoin = groupEvs.reduce((s, e) => s + e.tiers.filter(t=>t.checked).reduce((a,t)=>a+t.r1,0), 0);
    const allGroupR2 = groupEvs.reduce((s, e) => s + e.tiers.filter(t=>t.checked).reduce((a,t)=>a+t.r2,0), 0);
    const r2Name = ev.r2_name || '';
    const tabTotal = document.createElement('div');
    tabTotal.className = 'tab-total';
    tabTotal.innerHTML = `
        <span class="tab-total-label">Tab Total:</span>
        <span class="tab-total-val">${allGroupCoin.toLocaleString('en-US')} Coin</span>
        ${allGroupR2 > 0 ? `<span class="tab-total-val secondary">+${allGroupR2} ${r2Name}</span>` : ''}
    `;
    panelsEl.appendChild(tabTotal);

    // Grand totals by reward type
    let totalCoin = 0, totalCrown = 0, totalWeapon = 0, checkedAll = 0, totalAll = 0;
    events.forEach(ev => {
        ev.tiers.forEach(t => {
            totalAll++;
            if (t.checked) {
                checkedAll++;
                totalCoin += t.r1;
                if (ev.r2_name === 'Crown Fragment') totalCrown += t.r2;
                if (ev.r2_name === 'Weapon Fragment') totalWeapon += t.r2;
            }
        });
    });
    document.getElementById('totalChecked').textContent = `${checkedAll} / ${totalAll}`;
    document.getElementById('totalCoin').textContent = totalCoin.toLocaleString('en-US');
    document.getElementById('totalCrown').textContent = totalCrown.toLocaleString('en-US');
    document.getElementById('totalWeapon').textContent = totalWeapon.toLocaleString('en-US');
}

render();
</script>
</body>
</html>
